components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
    AccountSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Query:
      name: q
      in: query
      required: false
      schema:
        type: string
    City:
      name: city
      in: query
      required: false
      schema:
        type: string
    District:
      name: district
      in: query
      required: false
      schema:
        type: string
    CategoryId:
      name: categoryId
      in: query
      required: false
      schema:
        type: string
    ServiceId:
      name: serviceId
      in: query
      required: false
      schema:
        type: string
    SpecialistId:
      name: specialistId
      in: query
      required: false
      schema:
        type: string
    LocationId:
      name: locationId
      in: query
      required: false
      schema:
        type: string
    PriceFrom:
      name: priceFrom
      in: query
      required: false
      schema:
        type: number
        format: float
    PriceTo:
      name: priceTo
      in: query
      required: false
      schema:
        type: number
        format: float
    RatingFrom:
      name: ratingFrom
      in: query
      required: false
      schema:
        type: number
        format: float
    AvailableOn:
      name: availableOn
      in: query
      required: false
      schema:
        type: string
        format: date
    AvailableToday:
      name: availableToday
      in: query
      required: false
      schema:
        type: boolean
    AvailableTomorrow:
      name: availableTomorrow
      in: query
      required: false
      schema:
        type: boolean
    HasOnlinePayment:
      name: hasOnlinePayment
      in: query
      required: false
      schema:
        type: boolean
    HasPromo:
      name: hasPromo
      in: query
      required: false
      schema:
        type: boolean
    Tags:
      name: tags
      in: query
      required: false
      schema:
        type: string
    Sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
    Date:
      name: date
      in: query
      required: false
      schema:
        type: string
        format: date
    AccountId:
      name: accountId
      in: query
      required: false
      schema:
        type: string
    FromDate:
      name: from
      in: query
      required: true
      schema:
        type: string
        format: date
    ToDate:
      name: to
      in: query
      required: true
      schema:
        type: string
        format: date
    RangeFrom:
      name: rangeFrom
      in: query
      required: false
      schema:
        type: string
    RangeTo:
      name: rangeTo
      in: query
      required: false
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string

  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: session
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/Error'
    Error:
      type: object
      required: [code, message, details]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    PageInfo:
      type: object
      required: [cursor, nextCursor, limit]
      properties:
        cursor:
          type: string
          nullable: true
        nextCursor:
          type: string
          nullable: true
        limit:
          type: integer
          minimum: 1
    ListResponse:
      type: object
      required: [data, page]
      properties:
        data:
          type: array
          items: {}
        page:
          $ref: '#/components/schemas/PageInfo'
    DataResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: true
    EmptyResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: {}
    OkResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          properties:
            ok:
              type: boolean

    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

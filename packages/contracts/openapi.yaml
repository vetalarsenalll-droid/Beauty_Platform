          items:
            $ref: '#/components/schemas/FavoriteItem'
    ClientLoyaltyResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/LoyaltyWallet'
    ClientNotificationsResponse:
      type: object
      required: [data, page]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/NotificationItem'
        page:
          $ref: '#/components/schemas/PageInfo'
    ClientPaymentsResponse:
      type: object
      required: [data, page]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PaymentItem'
        page:
          $ref: '#/components/schemas/PageInfo'
    ClientSettingsResponse:
      type: object
      required: [data]
      properties:
        data:

      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [date, times]
          properties:
            date:
              type: string
              format: date
            times:
              type: array
              items:
                $ref: '#/components/schemas/PublicOfferTime'

    PublicBookingAppointmentCreateRequest:
      type: object
      required: [locationId, specialistId, serviceId, date, time]
      properties:
        locationId:
          type: integer
        specialistId:
          type: integer
        serviceId:
          type: integer
        date:
          type: string
          format: date
        time:
          type: string
          example: "13:30"
        clientName:
          type: string
        clientPhone:
          type: string
        clientEmail:
          type: string
        comment:
          type: string
        legalVersionIds:
          type: array
          items:
            type: integer
        holdId:
          type: integer
          description: Optional hold id obtained from /public/booking/holds

    PublicBookingAppointmentCreateResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [appointmentId]
          properties:
            appointmentId:
              type: integer

    PublicBookingHoldCreateRequest:
      type: object
      required: [locationId, specialistId, serviceId, date, time]
      properties:
        locationId:
          type: integer
        specialistId:
          type: integer
        serviceId:
          type: integer
        date:
          type: string
          format: date
        time:
          type: string
          example: "13:30"

    PublicBookingHoldCreateResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [holdId, expiresAt]
          properties:
            holdId:
              type: integer
            expiresAt:
              type: string
              format: date-time
            durationMin:
              type: integer
            priceTotal:
              type: number

    PublicAccount:
      type: object
      required: [id, name, slug, timeZone, slotStepMinutes]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        timeZone:
          type: string
        slotStepMinutes:
          type: integer

    PublicLocation:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
          nullable: true

    PublicService:
      type: object
      required: [id, name, baseDurationMin, basePrice]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        baseDurationMin:
          type: integer
        basePrice:
          type: number
          format: float
        computedDurationMin:
          type: integer
          nullable: true
        computedPrice:
          type: number
          format: float
          nullable: true
        specialistIds:
          type: array
          items:
            type: integer

    PublicSpecialist:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
          nullable: true
        levelId:
          type: integer
          nullable: true

    PublicSlot:
      type: object
      required: [time, specialistId]
      properties:
        time:
          type: string
          example: "09:30"
        specialistId:
          type: integer

    PublicAvailabilityDay:
      type: object
      required: [date, times]
      properties:
        date:
          type: string
          format: date
        times:
          type: array
          items:
            $ref: '#/components/schemas/PublicAvailabilityTime'

    PublicAvailabilityTime:
      type: object
      required: [time, specialistIds]
      properties:
        time:
          type: string
          example: "10:00"
        specialistIds:
          type: array
          items:
            type: integer

    PublicOfferTime:
      type: object
      required: [time, services]
      properties:
        time:
          type: string
          example: "11:00"
        services:
          type: array
          items:
            $ref: '#/components/schemas/PublicOfferService'

    PublicOfferService:
      type: object
      required: [serviceId, specialistIds]
      properties:
        serviceId:
          type: integer
        specialistIds:
          type: array
          items:
            type: integer

    PublicLegalDocument:
      type: object
      required: [id, title, isRequired, versionId, version, content]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        isRequired:
          type: boolean
        versionId:
          type: integer
        version:
          type: integer
        content:
          type: string
        publishedAt:
          type: string
          format: date-time

    MarketplaceCard:
      type: object
      required: [id, type, name]
      properties:
        id:
          type: string
        type:
          type: string
          description: account|location|specialist|service
        name:
          type: string
        subtitle:
          type: string
        rating:
          type: number
          format: float
        priceFrom:
          type: number
          format: float
        isAvailableToday:
          type: boolean
        hasOnlinePayment:
          type: boolean
        hasPromo:
          type: boolean
        slug:
          type: string
        coverUrl:
          type: string
    MarketplaceMapPoint:
      type: object
      required: [id, lat, lng]
      properties:
        id:
          type: string
        lat:
          type: number
          format: float
        lng:
          type: number
          format: float
        label:
          type: string
        type:
          type: string
    MarketplaceAccount:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        rating:
          type: number
          format: float
        description:
          type: string
        branding:
          type: object
          additionalProperties: true
        publicPage:
          type: object
          additionalProperties: true
    MarketplaceLocation:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        geo:
          type: object
          properties:
            lat:
              type: number
              format: float
            lng:
              type: number
              format: float
    MarketplaceSpecialist:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        bio:
          type: string
        level:
          type: string
        rating:
          type: number
          format: float
    MarketplaceService:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        baseDurationMin:
          type: integer
        basePrice:
          type: number
          format: float

    AvailabilityDay:
      type: object
      required: [date, hasSlots]
      properties:
        date:
          type: string
          format: date
        hasSlots:
          type: boolean
    SlotItem:
      type: object
      required: [time]
      properties:
        time:
          type: string
        specialistId:
          type: string
        durationMin:
          type: integer
        price:
          type: number
          format: float

    Appointment:
      type: object
      required: [id, status, startAt, endAt]
      properties:
        id:
          type: string
        status:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        priceTotal:
          type: number
          format: float
        durationTotalMin:
          type: integer

    SettingsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: true
    SettingsUpdateRequest:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true

    GenericCreateRequest:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true
    GenericUpdateRequest:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true

    ClientMeResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ClientProfile'
    ClientAppointmentsResponse:
      type: object
      required: [data, page]

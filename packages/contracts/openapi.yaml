    /crm/managers:
      get:
        tags: [crm]
        summary: List managers
        responses:
          '200':
            description: Managers list
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CrmManagersResponse'
      post:
        tags: [crm]
        summary: Create manager
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmManagerCreateRequest'
        responses:
          '201':
            description: Manager created
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CrmManagerResponse'
    /crm/managers/{id}:
      get:
        tags: [crm]
        summary: Get manager
        parameters:
          - $ref: '#/components/parameters/Id'
        responses:
          '200':
            description: Manager
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CrmManagerResponse'
      patch:
        tags: [crm]
        summary: Update manager
        parameters:
          - $ref: '#/components/parameters/Id'
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmManagerUpdateRequest'
        responses:
          '200':
            description: Manager updated
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CrmManagerResponse'
      delete:
        tags: [crm]
        summary: Delete manager
        parameters:
          - $ref: '#/components/parameters/Id'
        responses:
          '200':
            description: Manager deleted
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/OkResponse'
    /crm/managers/{id}/bindings:
      patch:
        tags: [crm]
        summary: Update manager bindings
        parameters:
          - $ref: '#/components/parameters/Id'
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmManagerBindingsRequest'
        responses:
          '200':
            description: Manager bindings updated
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CrmManagerBindingsResponse'

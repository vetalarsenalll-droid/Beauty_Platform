openapi: 3.0.3
info:
  title: Beauty Platform API
  version: v1
  description: API contract for Beauty Platform.
servers:
  - url: /api/v1
security:
  - CookieAuth: []
  - BearerAuth: []

tags:
  - name: auth
  - name: marketplace
  - name: booking
  - name: public-booking
  - name: client
  - name: crm
  - name: platform
  - name: integrations
  - name: ai
  - name: realtime

paths:
  /auth/login:
    post:
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /auth/refresh:
    post:
      tags: [auth]
      summary: Refresh access token
      responses:
        '200':
          description: Refresh success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRefreshResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /auth/logout:
    post:
      tags: [auth]
      summary: Logout
      responses:
        '200':
          description: Logout success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
  /auth/me:
    get:
      tags: [auth]
      summary: Current session info
      responses:
        '200':
          description: Session data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /marketplace/feed:
    get:
      tags: [marketplace]
      summary: Marketplace feed
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/City'
        - $ref: '#/components/parameters/District'
        - $ref: '#/components/parameters/CategoryId'
        - $ref: '#/components/parameters/ServiceId'
        - $ref: '#/components/parameters/SpecialistId'
        - $ref: '#/components/parameters/LocationId'
        - $ref: '#/components/parameters/PriceFrom'
        - $ref: '#/components/parameters/PriceTo'
        - $ref: '#/components/parameters/RatingFrom'
        - $ref: '#/components/parameters/AvailableOn'
        - $ref: '#/components/parameters/AvailableToday'
        - $ref: '#/components/parameters/AvailableTomorrow'
        - $ref: '#/components/parameters/HasOnlinePayment'
        - $ref: '#/components/parameters/HasPromo'
        - $ref: '#/components/parameters/Tags'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Feed list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceFeedResponse'
  /marketplace/map:
    get:
      tags: [marketplace]
      summary: Marketplace map points
      parameters:
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/City'
        - $ref: '#/components/parameters/District'
        - $ref: '#/components/parameters/CategoryId'
        - $ref: '#/components/parameters/ServiceId'
        - $ref: '#/components/parameters/SpecialistId'
        - $ref: '#/components/parameters/LocationId'
        - $ref: '#/components/parameters/PriceFrom'
        - $ref: '#/components/parameters/PriceTo'
        - $ref: '#/components/parameters/RatingFrom'
        - $ref: '#/components/parameters/AvailableOn'
        - $ref: '#/components/parameters/AvailableToday'
        - $ref: '#/components/parameters/AvailableTomorrow'
        - $ref: '#/components/parameters/HasOnlinePayment'
        - $ref: '#/components/parameters/HasPromo'
        - $ref: '#/components/parameters/Tags'
      responses:
        '200':
          description: Map list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceMapResponse'
  /marketplace/search:
    get:
      tags: [marketplace]
      summary: Marketplace search
      parameters:
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/City'
        - $ref: '#/components/parameters/District'
        - $ref: '#/components/parameters/CategoryId'
        - $ref: '#/components/parameters/ServiceId'
        - $ref: '#/components/parameters/SpecialistId'
        - $ref: '#/components/parameters/LocationId'
        - $ref: '#/components/parameters/PriceFrom'
        - $ref: '#/components/parameters/PriceTo'
        - $ref: '#/components/parameters/RatingFrom'
        - $ref: '#/components/parameters/AvailableOn'
        - $ref: '#/components/parameters/AvailableToday'
        - $ref: '#/components/parameters/AvailableTomorrow'
        - $ref: '#/components/parameters/HasOnlinePayment'
        - $ref: '#/components/parameters/HasPromo'
        - $ref: '#/components/parameters/Tags'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Search list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceSearchResponse'
  /marketplace/accounts/{slug}:
    get:
      tags: [marketplace]
      summary: Public account profile
      parameters:
        - $ref: '#/components/parameters/AccountSlug'
      responses:
        '200':
          description: Account profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceAccountResponse'
  /marketplace/locations/{id}:
    get:
      tags: [marketplace]
      summary: Public location profile
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Location profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceLocationResponse'
  /marketplace/specialists/{id}:
    get:
      tags: [marketplace]
      summary: Public specialist profile
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Specialist profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceSpecialistResponse'
  /marketplace/services/{id}:
    get:
      tags: [marketplace]
      summary: Public service profile
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Service profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceServiceResponse'

  /booking/availability:
    get:
      tags: [booking]
      summary: Availability by days
      parameters:
        - $ref: '#/components/parameters/AccountSlug'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
        - $ref: '#/components/parameters/LocationId'
        - $ref: '#/components/parameters/ServiceId'
        - $ref: '#/components/parameters/SpecialistId'
      responses:
        '200':
          description: Availability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingAvailabilityResponse'
  /booking/slots:
    get:
      tags: [booking]
      summary: Slots for a day or range
      parameters:
        - $ref: '#/components/parameters/Date'
        - $ref: '#/components/parameters/AccountId'
        - $ref: '#/components/parameters/LocationId'
        - $ref: '#/components/parameters/ServiceId'
        - $ref: '#/components/parameters/SpecialistId'
        - $ref: '#/components/parameters/RangeFrom'
        - $ref: '#/components/parameters/RangeTo'
      responses:
        '200':
          description: Slots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingSlotsResponse'
  /booking/appointments:
    post:
      tags: [booking]
      summary: Create appointment
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCreateRequest'
      responses:
        '200':
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /booking/appointments/{id}/reschedule:
    post:
      tags: [booking]
      summary: Reschedule appointment
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentRescheduleRequest'
      responses:
        '200':
          description: Appointment rescheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'
  /booking/appointments/{id}/cancel:
    post:
      tags: [booking]
      summary: Cancel appointment
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCancelRequest'
      responses:
        '200':
          description: Appointment cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'

  /public/booking/context:
    get:
      tags: [public-booking]
      summary: Public booking context (account + locations)
      security: []
      parameters:
        - $ref: '#/components/parameters/PublicAccount'
      responses:
        '200':
          description: Public booking context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicBookingContextResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /public/booking/locations/{id}/services:
    get:
      tags: [public-booking]
      summary: Public services list for location
      security: []
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/PublicAccount'
        - $ref: '#/components/parameters/SpecialistId'
      responses:
        '200':
          description: Services list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicBookingServicesResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /public/booking/locations/{id}/specialists:
    get:
      tags: [public-booking]
      summary: Public specialists list for location
      security: []
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/PublicAccount'
        - $ref: '#/components/parameters/ServiceId'
      responses:
        '200':
          description: Specialists list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicBookingSpecialistsResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /public/booking/availability/specialists:
    get:
      tags: [public-booking]
      summary: Specialists with workdays in range
      security: []
      parameters:
        - $ref: '#/components/parameters/PublicAccount'
        - $ref: '#/components/parameters/LocationId'
        - $ref: '#/components/parameters/Start'
        - $ref: '#/components/parameters/Days'
      responses:
        '200':
          description: Specialist ids
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicBookingAvailabilitySpecialistsResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /public/booking/availability/calendar:
    get:
      tags: [public-booking]
      summary: Availability calendar (days -> time -> specialists)
      security: []
      parameters:
        - $ref: '#/components/parameters/PublicAccount'
        - $ref: '#/components/parameters/LocationId'
        - $ref: '#/components/parameters/ServiceId'
        - $ref: '#/components/parameters/SpecialistId'
        - $ref: '#/components/parameters/Start'
        - $ref: '#/components/parameters/Days'
      responses:
        '200':
          description: Availability calendar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicBookingAvailabilityCalendarResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /public/booking/slots:
    get:
      tags: [public-booking]
      summary: Slots for a date
      security: []
      parameters:
        - $ref: '#/components/parameters/PublicAccount'
        - $ref: '#/components/parameters/LocationId'
        - $ref: '#/components/parameters/Date'
        - $ref: '#/components/parameters/ServiceId'
        - $ref: '#/components/parameters/SpecialistId'
      responses:
        '200':
          description: Slots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicBookingSlotsResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /public/booking/offers:
    get:
      tags: [public-booking]
      summary: Offers by time (time -> services -> specialists)
      security: []
      parameters:
        - $ref: '#/components/parameters/PublicAccount'
        - $ref: '#/components/parameters/LocationId'
        - $ref: '#/components/parameters/Date'
      responses:
        '200':
          description: Offers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicBookingOffersResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /public/booking/appointments:
    post:
      tags: [public-booking]
      summary: Create public appointment
      security: []
      parameters:
        - $ref: '#/components/parameters/PublicAccount'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicBookingAppointmentCreateRequest'
      responses:
        '200':
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicBookingAppointmentCreateResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /public/booking/holds:
    post:
      tags: [public-booking]
      summary: Create temporary hold for a booking slot
      security: []
      parameters:
        - $ref: '#/components/parameters/PublicAccount'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicBookingHoldCreateRequest'
      responses:
        '200':
          description: Hold created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicBookingHoldCreateResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /client/me:
    get:
      tags: [client]
      summary: Current client profile
      responses:
        '200':
          description: Client profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientMeResponse'
  /client/appointments:
    get:
      tags: [client]
      summary: Client appointments
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Appointments list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientAppointmentsResponse'
  /client/favorites:
    get:
      tags: [client]
      summary: Client favorites
      responses:
        '200':
          description: Favorites list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientFavoritesResponse'
  /client/loyalty:
    get:
      tags: [client]
      summary: Client loyalty wallet
      responses:
        '200':
          description: Loyalty wallet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientLoyaltyResponse'
  /client/notifications:
    get:
      tags: [client]
      summary: Client notifications
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Notifications list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientNotificationsResponse'
  /client/payments:
    get:
      tags: [client]
      summary: Client payments
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Payments list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientPaymentsResponse'
  /client/settings:
    get:
      tags: [client]
      summary: Client settings
      responses:
        '200':
          description: Client settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientSettingsResponse'
    patch:
      tags: [client]
      summary: Update client settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsUpdateRequest'
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientSettingsResponse'

  /crm/calendar:
    get:
      tags: [crm]
      summary: CRM calendar
      parameters:
        - $ref: '#/components/parameters/Date'
      responses:
        '200':
          description: Calendar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmCalendarResponse'
  /crm/auth/login:
    post:
      tags: [crm]
      summary: CRM login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrmAuthLoginRequest'
      responses:
        '200':
          description: CRM login response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmAuthLoginResponse'
  /crm/auth/me:
    get:
      tags: [crm]
      summary: CRM session info
      responses:
        '200':
          description: CRM session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmAuthMeResponse'
  /crm/auth/refresh:
    post:
      tags: [crm]
      summary: Refresh CRM session
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRefreshResponse'
  /crm/auth/logout:
    post:
      tags: [crm]
      summary: CRM logout
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
  /crm/locations:
    get:
      tags: [crm]
      summary: List locations
      responses:
        '200':
          description: Locations list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmLocationsResponse'
    post:
      tags: [crm]
      summary: Create location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrmLocationCreateRequest'
      responses:
        '201':
          description: Location created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmLocationResponse'
  /crm/locations/{id}:
    get:
      tags: [crm]
      summary: Get location
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Location
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmLocationResponse'
    patch:
      tags: [crm]
      summary: Update location
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrmLocationUpdateRequest'
      responses:
        '200':
          description: Location updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmLocationResponse'
    delete:
      tags: [crm]
      summary: Delete location
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Location deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
  /crm/locations/{id}/hours:
    patch:
      tags: [crm]
      summary: Update location hours
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrmLocationHoursUpdateRequest'
      responses:
        '200':
          description: Location hours updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmLocationHoursResponse'
  /crm/locations/{id}/bindings:
    patch:
      tags: [crm]
      summary: Update location bindings
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrmLocationBindingsRequest'
      responses:
        '200':
          description: Location bindings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmLocationBindingsResponse'
  /crm/locations/{id}/media:
    post:
      tags: [crm]
      summary: Add location media
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CrmLocationMediaUploadRequest'
      responses:
        '200':
          description: Media linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmLocationMediaResponse'
  /crm/locations/{id}/media/{linkId}:
    delete:
      tags: [crm]
      summary: Delete location media
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/LinkId'
      responses:
        '200':
          description: Media deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
    patch:
      tags: [crm]
      summary: Update location media
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/LinkId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrmLocationMediaUpdateRequest'
      responses:
        '200':
          description: Media updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmLocationMediaUpdateResponse'
  /crm/service-categories:
    get:
      tags: [crm]
      summary: List service categories
      responses:
        '200':
          description: Categories list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmServiceCategoriesResponse'
    post:
      tags: [crm]
      summary: Create service category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrmServiceCategoryCreateRequest'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmServiceCategoryResponse'
  /crm/service-categories/{id}:
    patch:
      tags: [crm]
      summary: Update service category
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrmServiceCategoryUpdateRequest'
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmServiceCategoryResponse'
    delete:
      tags: [crm]
      summary: Delete service category
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Category deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
  /crm/schedule:
    get:
      tags: [crm]
      summary: CRM schedule
      responses:
        '200':
          description: Schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmScheduleResponse'
  /crm/schedule/entries:
    get:
      tags: [crm]
      summary: List schedule entries
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: specialistId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Schedule entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmScheduleEntriesResponse'
    post:
      tags: [crm]
      summary: Upsert schedule entries

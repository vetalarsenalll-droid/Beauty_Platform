openapi: 3.0.3
info:
  title: Beauty Platform API
  version: v1
  description: API contract for Beauty Platform.
servers:
  - url: /api/v1
security:
  - CookieAuth: []
  - BearerAuth: []

tags:
  - name: auth
  - name: marketplace
  - name: booking
  - name: client
  - name: crm
  - name: platform
  - name: integrations
  - name: ai
  - name: realtime

paths:
  /auth/login:
    post:
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /auth/refresh:
    post:
      tags: [auth]
      summary: Refresh access token
      responses:
        '200':
          description: Refresh success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRefreshResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /auth/logout:
    post:
      tags: [auth]
      summary: Logout
      responses:
        '200':
          description: Logout success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
  /auth/me:
    get:
      tags: [auth]
      summary: Current session info
      responses:
        '200':
          description: Session data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /marketplace/feed:
    get:
      tags: [marketplace]
      summary: Marketplace feed
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/City'
        - $ref: '#/components/parameters/District'
        - $ref: '#/components/parameters/CategoryId'
        - $ref: '#/components/parameters/ServiceId'
        - $ref: '#/components/parameters/SpecialistId'
        - $ref: '#/components/parameters/LocationId'
        - $ref: '#/components/parameters/PriceFrom'
        - $ref: '#/components/parameters/PriceTo'
        - $ref: '#/components/parameters/RatingFrom'
        - $ref: '#/components/parameters/AvailableOn'
        - $ref: '#/components/parameters/AvailableToday'
        - $ref: '#/components/parameters/AvailableTomorrow'
        - $ref: '#/components/parameters/HasOnlinePayment'
        - $ref: '#/components/parameters/HasPromo'
        - $ref: '#/components/parameters/Tags'
        - $ref: '#/components/parameters/Sort'

      tags: [integrations]
      summary: List webhook endpoints
      responses:
        '200':
          description: Endpoints list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEndpointsResponse'
    post:
      tags: [integrations]
      summary: Create webhook endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericCreateRequest'
      responses:
        '200':
          description: Endpoint created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEndpointResponse'
  /integrations/webhooks/endpoints/{id}/test:
    post:
      tags: [integrations]
      summary: Test webhook endpoint
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
  /integrations/webhooks/deliveries:
    get:
      tags: [integrations]
      summary: Webhook deliveries
      responses:
        '200':
          description: Deliveries list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookDeliveriesResponse'

  /ai/threads:
    post:
      tags: [ai]
      summary: Create AI thread
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericCreateRequest'
      responses:
        '200':
          description: Thread created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiThreadResponse'
  /ai/threads/{id}:
    get:
      tags: [ai]
      summary: Get AI thread
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Thread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiThreadResponse'
  /ai/threads/{id}/messages:
    post:
      tags: [ai]
      summary: Post AI message
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericCreateRequest'
      responses:
        '200':
          description: Message created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiMessageResponse'
  /ai/logs:
    get:
      tags: [ai]
      summary: AI logs
      responses:
        '200':
          description: Logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiLogsResponse'
  /ai/settings:
    get:
      tags: [ai]
      summary: AI settings
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiSettingsResponse'
    patch:
      tags: [ai]
      summary: Update AI settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsUpdateRequest'
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiSettingsResponse'
  /ai/limits:
    get:
      tags: [ai]
      summary: AI limits
      responses:
        '200':
          description: Limits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiLimitsResponse'

  /realtime/sse:
    get:
      tags: [realtime]
      summary: SSE stream
      parameters:
        - name: channels
          in: query
          schema:
            type: string
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
    LinkId:
      name: linkId
      in: path
      required: true
      schema:
        type: string
    AccountSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Query:
      name: q
      in: query
      required: false
      schema:
        type: string
    City:
      name: city
      in: query
      required: false
      schema:
        type: string
    District:
      name: district
      in: query
      required: false
      schema:
        type: string
    CategoryId:
      name: categoryId
      in: query
      required: false
      schema:
        type: string
    ServiceId:
      name: serviceId
      in: query
      required: false
      schema:
        type: string
    SpecialistId:
      name: specialistId
      in: query
      required: false
      schema:
        type: string
    LocationId:
      name: locationId
      in: query
      required: false
      schema:
        type: string
    PriceFrom:
      name: priceFrom
      in: query
      required: false
      schema:
        type: number
        format: float
    PriceTo:
      name: priceTo
      in: query
      required: false
      schema:
        type: number
        format: float
    RatingFrom:
      name: ratingFrom
      in: query
      required: false
      schema:
        type: number
        format: float
    AvailableOn:
      name: availableOn
      in: query
      required: false
      schema:
        type: string
        format: date
    AvailableToday:
      name: availableToday
      in: query
      required: false
      schema:
        type: boolean
    AvailableTomorrow:
      name: availableTomorrow
      in: query
      required: false
      schema:
        type: boolean
    HasOnlinePayment:
      name: hasOnlinePayment
      in: query
      required: false
      schema:
        type: boolean
    HasPromo:
      name: hasPromo
      in: query
      required: false
      schema:
        type: boolean
    Tags:
      name: tags
      in: query
      required: false
      schema:
        type: string
    Sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
    Date:
      name: date
      in: query
      required: false
      schema:
        type: string
        format: date
    AccountId:
      name: accountId
      in: query
      required: false
      schema:
        type: string
    PublicAccount:
      name: account
      in: query
      required: false
      schema:
        type: string
      description: Public account slug
    FromDate:
      name: from
      in: query
      required: true
      schema:
        type: string
        format: date
    ToDate:
      name: to
      in: query
      required: true
      schema:
        type: string
        format: date
    Start:
      name: start
      in: query
      required: false
      schema:
        type: string
        format: date
    Days:
      name: days
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 60
    RangeFrom:
      name: rangeFrom
      in: query
      required: false
      schema:
        type: string
    RangeTo:
      name: rangeTo
      in: query
      required: false
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string

  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: session
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/Error'
    Error:
      type: object
      required: [code, message, details]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    PageInfo:
      type: object
      required: [cursor, nextCursor, limit]
      properties:
        cursor:
          type: string
          nullable: true
        nextCursor:
          type: string
          nullable: true
        limit:
          type: integer
          minimum: 1
    ListResponse:
      type: object
      required: [data, page]
      properties:
        data:
          type: array
          items: {}
        page:
          $ref: '#/components/schemas/PageInfo'
    DataResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: true
    EmptyResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: {}
    OkResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          properties:
            ok:
              type: boolean

    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthLoginResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/AuthUserSummary'
            permissions:
              type: array
              items:
                type: string
            accessToken:
              type: string
            refreshToken:
              type: string
            accessExpiresAt:
              type: string
              format: date-time
            refreshExpiresAt:
              type: string
              format: date-time
    AuthMeResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/AuthUserSummary'
            permissions:
              type: array
              items:
                type: string
    AuthUserSummary:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          nullable: true
    AuthRefreshResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          properties:
            accessToken:
              type: string
            refreshToken:
              type: string
            accessExpiresAt:
              type: string
              format: date-time
            refreshExpiresAt:
              type: string
              format: date-time

    AppointmentCreateRequest:

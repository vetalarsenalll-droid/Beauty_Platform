name: beauty_platform_dev
services:
  postgres:
    image: postgres:16
    container_name: beauty_platform_postgres
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - beauty_platform_pgdata:/var/lib/postgresql/data
volumes:
  beauty_platform_pgdata:
